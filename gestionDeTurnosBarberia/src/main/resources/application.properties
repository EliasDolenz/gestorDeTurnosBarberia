spring.application.name=Gestor de turnos de barberia
spring.profiles.active=dev

# CONFIGURACIÓN DE LA BASE DE DATOS MYSQL (DESARROLLO)
spring.datasource.url=jdbc:mysql://localhost:3306/gestor_de_turnos?serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=root
spring.datasource.password=root  # Solo en desarrollo local
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method