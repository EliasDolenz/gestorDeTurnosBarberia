spring.application.name=Gestor de turnos de barberia
# Perfil por defecto: local
spring.profiles.active=dev

# Si las variables no existen, usa 'root' por defecto
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.datasource.url=jdbc:mysql://localhost:3306/gestor_de_turnos?serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Eliminamos el Dialect manual (Spring lo detecta solo)
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html